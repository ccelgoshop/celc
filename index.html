<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Storefront</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            /* Use Telegram's native theme colors */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            text-align: center;
        }
        .product-card {
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 16px;
        }
        #ai-response { margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

    <h1>Nexus AI Store 🛒</h1>
    <p>Ask our AI assistant to find the perfect service for you!</p>

    <input type="text" id="user-query" placeholder="E.g., I need a website..." style="width: 90%; padding: 10px;">
    <button onclick="askAI()">Ask AI Assistant</button>
    
    <div id="ai-response"></div>

    <div class="product-card">
        <h3>Featured: Bot Development</h3>
        <p>$150.00</p>
        <button onclick="buyProduct()">Buy with CryptoPay</button>
    </div>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Opens the app in full-screen mode

        async function askAI() {
            const query = document.getElementById('user-query').value;
            const responseDiv = document.getElementById('ai-response');
            
            responseDiv.innerText = "Thinking...";
            
            // Call your Express backend API
            const res = await fetch('/api/ask-ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: query })
            });
            const data = await res.json();
            
            responseDiv.innerText = data.answer;
        }

        function buyProduct() {
            // This is where you trigger Stripe or Crypto checkout
            tg.showAlert("Redirecting to secure checkout...");
            // tg.sendData("buy_bot_dev"); // Sends data back to the bot
        }
    </script>
</body>
</html>
